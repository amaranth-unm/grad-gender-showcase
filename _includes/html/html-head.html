<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->

  <title>{% if page.title %}{{ page.title | escape }} // {{ site.title | escape }}{% else %}{{ site.title | escape }} // {{ site.tagline | escape }}{% endif %}</title>

  <meta name="description" content="{{ page.summary | default: 'Xanthan is a free, open-source website template for digital scholarship, portfolios, and scrollytelling narratives.' | escape }}">
  <meta name="author" content="">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph for social sharing -->
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.summary | default: 'Xanthan is a free, open-source website template for digital scholarship, portfolios, and scrollytelling narratives.' | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  {% if page.thumbnail or page.header-image %}
  <meta property="og:image" content="{{ page.thumbnail | default: page.header-image | absolute_url }}">
  {% endif %}

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- juxtapose.js CSS for image comparison -->
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/juxtapose/latest/css/juxtapose.css">

  <!-- littlefoot.js CSS for snappy footnotes -->
  <link rel="stylesheet" href="https://unpkg.com/littlefoot/dist/littlefoot.css" />

  <!-- Splide CSS for image carousels -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css">

  <!-- Base CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/cards.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/backgrounds.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/typography.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/nav.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/nav-left.css' | relative_url }}">

  <!--
    Alternate theme CSS that overrides bases above. 
    To use a new CSS file, remove the comment marks before and after the line below
  -->        
  
  <!-- <link href="{{site.baseurl}}/assets/css/themes/dark-energy.css" rel="stylesheet"> -->

  <!-- scrollstory layout CSS 
    To differentiate scrollstory pages from regular pages, we use a special layout value in the YAML front matter
    and load the scrollstory.css file.
  -->

  {% if page.layout == 'scrollstory' %}
  <link rel="stylesheet" href="{{ '/assets/css/scrollstory.css' | relative_url }}">
  {% endif %}
  
  {% if page.url contains '/docs/' %}
  <link rel="stylesheet" href="{{ '/assets/css/docs.css' | relative_url }}">
  {% endif %}
  
  {% if page.header-image %}
  <link rel="stylesheet" href="{{ '/assets/css/page-header.css' | relative_url }}">
  {% endif %}
  
  {% if site.search %}
  <link rel="stylesheet" href="{{ '/assets/css/search.css' | relative_url }}">
  {% endif %}
  
  {% if page.css %}
  <link rel="stylesheet" href="{{ '/assets/css/' | append: page.css | relative_url }}">
  {% endif %}
</head>
